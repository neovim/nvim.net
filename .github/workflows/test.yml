name: Test

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    env:
      CONFIGURATION: Release
      TEST_PROJECT: test/NvimClient.Test/NvimClient.Test.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: >
          dotnet build
          --configuration "$CONFIGURATION"
          --no-restore
          -p:ContinuousIntegrationBuild=true

      - name: Test
        run: >
          dotnet test
          -p:TestTfmsInParallel=false
          "$TEST_PROJECT"
          --configuration "$CONFIGURATION"
          --no-build
          --verbosity normal
          --blame-hang
          --blame-hang-timeout 60s
